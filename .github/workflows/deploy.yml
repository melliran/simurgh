name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: server
          push: true
          tags: ghcr.io/melliran/simurgh:latest
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}

      - name: Prepare deploy files
        env:
          THEFEED_DOMAIN: ${{ secrets.THEFEED_DOMAIN }}
          THEFEED_KEY: ${{ secrets.THEFEED_KEY }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_PHONE: ${{ secrets.TELEGRAM_PHONE }}
          THEFEED_CHANNELS: ${{ secrets.THEFEED_CHANNELS }}
          THEFEED_X_ACCOUNTS: ${{ secrets.THEFEED_X_ACCOUNTS }}
          TELEGRAM_SESSION_B64: ${{ secrets.TELEGRAM_SESSION_B64 }}
        run: |
          mkdir -p deploy

          # .env
          cat > deploy/.env << 'EOF'
          EOF
          printf 'THEFEED_DOMAIN=%s\n' "$THEFEED_DOMAIN" >> deploy/.env
          printf 'THEFEED_KEY=%s\n' "$THEFEED_KEY" >> deploy/.env
          printf 'TELEGRAM_API_ID=%s\n' "$TELEGRAM_API_ID" >> deploy/.env
          printf 'TELEGRAM_API_HASH=%s\n' "$TELEGRAM_API_HASH" >> deploy/.env
          printf 'TELEGRAM_PHONE=%s\n' "$TELEGRAM_PHONE" >> deploy/.env
          printf 'THEFEED_CHANNELS=%s\n' "$THEFEED_CHANNELS" >> deploy/.env
          printf 'THEFEED_X_ACCOUNTS=%s\n' "$THEFEED_X_ACCOUNTS" >> deploy/.env

          # session.json
          echo "$TELEGRAM_SESSION_B64" | base64 -d > deploy/session.json

          # docker-compose.yml
          cp docker-compose.server.yml deploy/docker-compose.yml

      - name: Deploy to Hetzner
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Create remote directories
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@188.245.42.219 \
            "mkdir -p /opt/simurgh/data && chown -R 1000:1000 /opt/simurgh/data"

          # Copy files
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            deploy/.env deploy/session.json deploy/docker-compose.yml \
            root@188.245.42.219:/opt/simurgh/

          # Move session.json into data dir
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@188.245.42.219 \
            "mv /opt/simurgh/session.json /opt/simurgh/data/session.json"

          # Stop client container if still running, pull and restart server
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@188.245.42.219 \
            "echo '$GHCR_TOKEN' | docker login ghcr.io -u melliran --password-stdin && cd /opt/simurgh && docker compose stop simurgh-client 2>/dev/null || true && docker compose rm -f simurgh-client 2>/dev/null || true && docker compose pull && docker compose up -d"

          echo "Deployed successfully"
