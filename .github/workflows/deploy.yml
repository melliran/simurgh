name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: server
          push: true
          tags: ghcr.io/melliran/simurgh:latest
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}

      - name: Build and push client image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: client
          push: true
          tags: ghcr.io/melliran/simurgh-client:latest
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp }}

      - name: Deploy to Hetzner
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THEFEED_DOMAIN: ${{ secrets.THEFEED_DOMAIN }}
          THEFEED_KEY: ${{ secrets.THEFEED_KEY }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_PHONE: ${{ secrets.TELEGRAM_PHONE }}
          THEFEED_CHANNELS: ${{ secrets.THEFEED_CHANNELS }}
          THEFEED_X_ACCOUNTS: ${{ secrets.THEFEED_X_ACCOUNTS }}
          TELEGRAM_SESSION_B64: ${{ secrets.TELEGRAM_SESSION_B64 }}
          FEED_PASSWORD: ${{ secrets.FEED_PASSWORD }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=10 \
            root@188.245.42.219 \
            GHCR_TOKEN="$GHCR_TOKEN" \
            THEFEED_DOMAIN="$THEFEED_DOMAIN" \
            THEFEED_KEY="$THEFEED_KEY" \
            TELEGRAM_API_ID="$TELEGRAM_API_ID" \
            TELEGRAM_API_HASH="$TELEGRAM_API_HASH" \
            TELEGRAM_PHONE="$TELEGRAM_PHONE" \
            THEFEED_CHANNELS="$THEFEED_CHANNELS" \
            THEFEED_X_ACCOUNTS="$THEFEED_X_ACCOUNTS" \
            TELEGRAM_SESSION_B64="$TELEGRAM_SESSION_B64" \
            FEED_PASSWORD="$FEED_PASSWORD" \
            bash << 'SSHEOF'
          set -e

          mkdir -p /opt/simurgh/data /opt/simurgh/clientdata /opt/simurgh/caddy/data /opt/simurgh/caddy/config
          chown -R 1000:1000 /opt/simurgh/data /opt/simurgh/clientdata

          echo "$GHCR_TOKEN" | docker login ghcr.io -u melliran --password-stdin

          echo "$TELEGRAM_SESSION_B64" | base64 -d > /opt/simurgh/data/session.json

          cat > /opt/simurgh/.env << ENVEOF
THEFEED_DOMAIN=$THEFEED_DOMAIN
THEFEED_KEY=$THEFEED_KEY
TELEGRAM_API_ID=$TELEGRAM_API_ID
TELEGRAM_API_HASH=$TELEGRAM_API_HASH
TELEGRAM_PHONE=$TELEGRAM_PHONE
THEFEED_CHANNELS=$THEFEED_CHANNELS
THEFEED_X_ACCOUNTS=$THEFEED_X_ACCOUNTS
FEED_PASSWORD=$FEED_PASSWORD
ENVEOF

          cat > /opt/simurgh/Caddyfile << 'CADDYEOF'
feed.melliran.com {
    reverse_proxy client:8080
}
CADDYEOF

          cat > /opt/simurgh/docker-compose.yml << 'COMPOSEEOF'
services:
  server:
    image: ghcr.io/melliran/simurgh:latest
    container_name: simurgh-server
    restart: unless-stopped
    ports:
      - "5300:5300/udp"
    volumes:
      - ./data:/data
    env_file:
      - .env
    command: >-
      --data-dir /data
      --listen :5300
      --domain ${THEFEED_DOMAIN}
      --key ${THEFEED_KEY}
      --api-id ${TELEGRAM_API_ID}
      --api-hash ${TELEGRAM_API_HASH}
      --phone ${TELEGRAM_PHONE}

  client:
    image: ghcr.io/melliran/simurgh-client:latest
    container_name: simurgh-client
    restart: unless-stopped
    volumes:
      - ./clientdata:/clientdata
    command: >-
      --data-dir /clientdata
      --port 8080
      --password ${FEED_PASSWORD}

  caddy:
    image: caddy:2-alpine
    container_name: simurgh-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
COMPOSEEOF

          cd /opt/simurgh
          docker compose pull
          docker compose up -d
          echo "Deployed successfully"
          SSHEOF
